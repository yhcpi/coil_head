# Hyperparameters for coil_head detection training (v5 experiment B)
# 改动日期：2026-07-05
# 目的：在 v4 (Coverage-only) 基础上做 NWD 消融，本配置 = NWD 替换 IoU，关闭 Coverage
# 数据：train=556（原 529 + 27 张 val-only FN）, val=102

# === 几何变换 ===
degrees: 5.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0005
flipud: 0.5
fliplr: 0.5

# === 颜色空间 ===
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

# === 组合增强（mosaic 关闭以保持 rect 几何）===
mosaic: 0.0
mixup: 0.0
copy_paste: 0.2

# === 损失/正则 ===
box: 5.0
cls: 1.0
dfl: 1.5
label_smoothing: 0.02

# === Coil-specific: bbox_random_shrink（保持中心，按边长随机缩放）===
bbox_shrink_min: 0.8
bbox_shrink_max: 1.2
bbox_shrink_p: 1.0

# === Coil-specific: multi-scale（保持长宽比）===
# 2026-07-09 修复：v6_v2/v6_v3 注释确认 multi_scale>0 触发 collate_fn stack 失败
# (v8_transforms 中 RandomScaleRect 让 batch 内 image 各异 size → torch.stack 必崩)
# 03 baseline 训练时这条 hook 还没注册，所以 multi_scale:0.2 实际从未生效
# 此处设 0 避开 collate bug，与 v6_v2/v6_v3 系列保持一致
multi_scale: 0.0

# === NWD（实验 B：替换 IoU）===
nwd: true                  # 启用 NWD 替换 IoU loss
nwd_constant: 12.0         # 高斯协方差尺度（AI-TOD 论文默认值）

# === Coverage Loss（本实验关闭）===
coverage: false
coverage_weight: 0.5
coverage_sigma: 20.0
