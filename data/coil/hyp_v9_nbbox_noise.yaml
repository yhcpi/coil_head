# v9 NBBoxNoise（基于 v8 NWD v1 weak aug + bbox 噪声注入）
# 改动日期: 2026-07-11
# 目的: 验证 NBBOX 论文 (2409.09424) 思路 — 训练期 GT bbox 加噪当 augmentation
#       让模型学"宽松标注也能定位 tip 中心"
# 默认开关: bbox_noise=false (与 v8 NWD 行为一致), 设 true 启用
#
# 复现路径 (基于 v8 NWD weak aug best F1=0.929):
#   v8 NWD weak (mAP50=0.869 + TTA F1=0.929) → v9 + NBBoxNoise

# === 几何变换（与 v8 NWD 一致, 弱 aug 保住 mAP）===
degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5

# === 颜色空间 ===
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

# === 组合增强（弱 aug）===
mosaic: 0.0
mixup: 0.0
copy_paste: 0.0

# === 损失/正则 ===
box: 1.5
cls: 0.5
dfl: 1.5
label_smoothing: 0.0

# === bbox_random_shrink（关闭，与 v8 NWD 一致）===
bbox_shrink_min: 1.0
bbox_shrink_max: 1.0
bbox_shrink_p: 0.0

# === multi-scale（关闭）===
multi_scale: 0.0

# === NWD ===
nwd: true
nwd_constant: 12.0

# === Coverage（关闭）===
coverage: false
coverage_weight: 0.5
coverage_sigma: 20.0

# === 🆕 NBBoxNoise (本次实验唯一变量) ===
# 训练时给 GT bbox 加 [scale, shift] 噪声 (per-instance 独立采样)
# 论文: NBBOX (2409.09424) — Noisy Bounding Box Improves Remote Sensing
bbox_noise: true
bbox_noise_scale: '0.5,1.5'   # 尺度抖动范围 [0.5x, 1.5x]
bbox_noise_shift: 0.1         # 平移距离 (相对 bbox size)
bbox_noise_p: 0.5             # 应用概率