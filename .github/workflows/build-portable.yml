name: Build CoilTipViz Portable (no PyInstaller - fast iteration)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  portable:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10 (only used to run build_portable.py itself)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure Tsinghua pip mirror
        run: |
          python -m pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          python -m pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: Build portable zip
        shell: cmd
        run: |
          cd scripts\gui
          python build_portable.py 2>&1
          echo "EXIT_CODE=%errorlevel%"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CoilTipViz-portable
          path: scripts/gui/dist/CoilTipViz-portable-*.zip
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: success()
        shell: cmd
        run: |
          echo Build complete!
          echo Download artifact: CoilTipViz-portable
          echo URL: https://github.com/%GITHUB_REPOSITORY%/actions/runs/%GITHUB_RUN_ID%
          for /f %%f in ('dir /b scripts\gui\dist\CoilTipViz-portable-*.zip') do echo File: %%f
