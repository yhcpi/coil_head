name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-exe:
    runs-on: windows-latest  # Windows Server 2022 with Visual Studio

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/gui/build_exe.bat') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Configure Tsinghua mirror (fast in China)
        run: |
          python -m pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          python -m pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: Install dependencies (ultralytics + opencv + pillow + av + ttkbootstrap + pyinstaller)
        run: |
          python -m pip install --upgrade pip
          # ⚠️ 必须 pin torch==2.5.x: torch 2.6+ 把 torch.load weights_only 默认从 False 改为 True,
          #    ultralytics 8.0.227 nn/tasks.py:567 不传 weights_only → UnpicklingError on DetectionModel
          #    pin torch==2.5.1+cu121 (CUDA 版) 让 .exe 走 GPU 推理 — PyInstaller 把 cudart/cublas/cudnn
          #    全打进 _internal/, 用户机器只需装 NVIDIA driver 即可 GPU 推理, 完全零安装
          python -m pip install 'torch==2.5.1+cu121' 'torchvision==0.20.1+cu121' --index-url https://download.pytorch.org/whl/cu121 --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple
          python -m pip install ultralytics==8.0.227 opencv-python pillow av ttkbootstrap pyinstaller

      - name: Verify imports (catch missing deps before PyInstaller wastes 10 min)
        run: |
          python -c "import ultralytics; import cv2; import av; import PIL; import ttkbootstrap; import PyInstaller; print('All deps OK, ttkbootstrap', __import__('ttkbootstrap'))"

      - name: Create placeholder weights (so PyInstaller always has a file to bundle)
        shell: cmd
        run: |
          if not exist runs\deploy_best mkdir runs\deploy_best
          if not exist runs\deploy_best\placeholder.pt type nul > runs\deploy_best\placeholder.pt
          if not exist runs\coil_panet_ablation mkdir runs\coil_panet_ablation

      - name: Run PyInstaller
        id: pyinstaller
        shell: pwsh
        run: |
          cd scripts/gui
          python build_exe.py 2>&1 | Tee-Object -FilePath pyinstaller.log
          echo "EXIT_CODE=$LASTEXITCODE" | Out-File -Append pyinstaller.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content pyinstaller.log -Tail 100 | Out-File -Append pyinstaller.log
          }
          exit $LASTEXITCODE
        env:
          PYTHONIOENCODING: utf-8

      - name: Build source zip (route B - no PyInstaller, ~10 MB)
        shell: pwsh
        run: |
          cd scripts/gui
          python build_src_zip.py 2>&1 | Tee-Object -FilePath src_zip.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content src_zip.log -Tail 50 | Out-File -Append src_zip.log
            exit $LASTEXITCODE
          }
          Get-ChildItem dist/CoilTipViz-source.zip | ForEach-Object {
            "src_zip size: $($_.Length / 1024 / 1024) MB"
          } | Out-File -Append src_zip.log

      - name: Upload debug log (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-debug-log
          path: scripts/gui/pyinstaller.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Zip artifact (via Python, robust for 1.5GB+)
        shell: cmd
        run: |
          cd scripts\gui\dist
          python -c "import zipfile, os; zf = zipfile.ZipFile('CoilTipViz-${{ github.sha }}.zip', 'w', zipfile.ZIP_DEFLATED, compresslevel=6); root='CoilTipViz'; [zf.write(os.path.join(r,f), os.path.join(r,f).replace(os.sep,'/')) for r,_,fs in os.walk(root) for f in fs]; zf.close(); print('zip OK:', os.path.getsize('CoilTipViz-${{ github.sha }}.zip')//1024//1024, 'MB')"

      - name: Build 7z-SFX self-extracting single .exe (smaller, ultra LZMA2)
        shell: pwsh
        run: |
          cd scripts\gui\dist
          # 7z is usually preinstalled on windows-latest; install if not
          if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
            Write-Host "Installing 7-Zip via chocolatey..."
            choco install 7zip -y --no-progress | Out-Null
          }
          $ver = (7z | Out-String).Trim().Split("`n")[0]
          Write-Host "7z: $ver"
          $sha = "${{ github.sha }}"
          # 7z-SFX self-extracting installer (~150-180 MB vs 291 MB zip)
          # User double-clicks → auto-extracts to chosen dir → launches CoilTipViz.exe
          Write-Host "Compressing CoilTipViz\ directory with 7z ultra LZMA2..."
          7z a -t7z "-mx=9" "-mfb=273" "-ms=on" "-sfx" "..\CoilTipViz-${sha}-installer.exe" "CoilTipViz\" 2>&1 | Select-Object -Last 6
          $instSize = (Get-Item "..\CoilTipViz-${sha}-installer.exe").Length
          Write-Host "installer size: $([math]::Round($instSize/1024/1024, 1)) MB (vs ~291 MB zip)"
          # Rename to CoilTipViz-windows-installer.exe for clarity
          Move-Item -Force "..\CoilTipViz-${sha}-installer.exe" "..\CoilTipViz-windows-installer.exe"
          Get-Item "..\CoilTipViz-windows-installer.exe" | ForEach-Object {
            Write-Host "FINAL: $($_.Name)  size=$(($_.Length/1024/1024).ToString('0.0')) MB"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoilTipViz-windows
          path: scripts/gui/dist/CoilTipViz-${{ github.sha }}.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload GPU SFX installer (smaller, 7z ultra LZMA2)
        uses: actions/upload-artifact@v4
        with:
          name: CoilTipViz-windows-installer
          path: scripts/gui/dist/CoilTipViz-windows-installer.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload source zip (route B)
        uses: actions/upload-artifact@v4
        with:
          name: CoilTipViz-source
          path: scripts/gui/dist/CoilTipViz-source.zip
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        if: success()
        run: |
          echo "Build complete!"
          echo "Two artifacts:"
          echo "  - CoilTipViz-windows  (route A .exe,  ~291 MB, 双击即用)"
          echo "  - CoilTipViz-source   (route B src,  ~10 MB, 需 install_hyper_yolo.bat + run_windows.bat)"
          echo "URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"